<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel BMS</title>
    <link rel="stylesheet" href="./styles.css">
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
    <script defer src="./renderer.js"></script>
</head>
<body>
    <main class="container">
        <header>
            <div class="header-row">
                <div class="header-left">
                    <h1>Sentinel Monitor</h1>
                </div>
                <div class="header-center">
                    <div class="status-indicators" aria-label="System status indicators">
                        <div class="status-indicator">
                            <span id="statusDotBms" class="status-dot" aria-hidden="true"></span>
                            <span>BMS</span>
                        </div>
                        <div class="status-indicator">
                            <span id="statusDotBoard" class="status-dot" aria-hidden="true"></span>
                            <span>Board</span>
                        </div>
                        <div class="status-indicator">
                            <span id="statusDotVoltage" class="status-dot" aria-hidden="true"></span>
                            <span>Voltage</span>
                        </div>
                        <div class="status-indicator">
                            <span id="statusDotTemp" class="status-dot" aria-hidden="true"></span>
                            <span>Temperature</span>
                        </div>
                    </div>
                </div>
                <div class="header-right">
                    <span id="balancingSummary" class="balancing-summary">0 Cells Balancing</span>
                    <button id="balancingButton" class="balancing-button" type="button" disabled>Balancing On</button>
                </div>
            </div>
        </header>
        <section class="layout">
            <div class="sidebar">
                <section class="panel">
                    <label for="portSelect">Serial Port</label>
                    <select id="portSelect" aria-label="Available serial ports"></select>
                    <div class="buttons">
                        <button id="connectButton" type="button">Connect</button>
                        <button id="disconnectButton" type="button" disabled>Disconnect</button>
                    </div>
                    <p id="status" class="status">Scanning for serial ports...</p>
                </section>
                <section class="panel sidebar-controls">
                    <div class="view-buttons">
                        <button id="moduleOverviewButton" class="view-button active" type="button">Module Overview</button>
                        <button id="packStatsButton" class="view-button" type="button">Pack Stats</button>
                    </div>
                </section>
                <section class="panel sidebar-controls">
                    <div class="action-buttons">
                        <button id="resetButton" type="button" disabled>Reset Data</button>
                        <button id="exportButton" type="button" disabled>Export CSV</button>
                    </div>
                </section>
            </div>
            <section class="content">
                <section class="panel chart-container">
                    <div id="packStatsView" class="view-panel" hidden>
                        <div class="chart-stack">
                            <section class="chart-panel">
                                <h2>Cell Voltages</h2>
                                <canvas id="voltageChart" aria-label="Cell voltage values over time"></canvas>
                            </section>
                            <section class="chart-panel">
                                <h2>Temperatures</h2>
                                <canvas id="temperatureChart" aria-label="Temperature values over time"></canvas>
                            </section>
                        </div>
                    </div>
                    <div id="moduleOverviewView" class="view-panel">
                        <div class="module-overview">
                            <div class="module-visuals">
                                <div class="module-summary-tile">
                                    <div class="module-summary-metric">
                                        <span id="modulePackAverage" class="module-pack-value">---V</span>
                                        <span class="module-pack-label">Avg Per Cell</span>
                                    </div>
                                    <div class="module-summary-metric">
                                        <span id="modulePackTotal" class="module-pack-value">---V</span>
                                        <span class="module-pack-label">Total Pack Voltage</span>
                                    </div>
                                </div>
                                <div id="moduleGrid" class="module-grid"></div>
                            </div>
                            <div class="module-table-wrap">
                                <table class="module-table" aria-label="Module statistics table">
                                    <thead>
                                        <tr>
                                            <th>Module</th>
                                            <th>V Avg</th>
                                            <th>V Min</th>
                                            <th>V Max</th>
                                            <th>T Avg</th>
                                            <th>T Min</th>
                                            <th>T Max</th>
                                        </tr>
                                    </thead>
                                    <tbody id="moduleTableBody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </section>
            </section>
        </section>
    </main>
    <div id="moduleModalBackdrop" class="modal-backdrop" hidden>
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="moduleModalTitle">
            <div class="modal-header">
                <h3 id="moduleModalTitle">Module Details</h3>
                <button id="moduleModalClose" class="modal-close" type="button">Close</button>
            </div>
            <section class="modal-section">
                <h4>Cells</h4>
                <table class="detail-table" aria-label="Module cell readings">
                    <thead id="moduleCellTableHead"></thead>
                    <tbody id="moduleCellTableBody"></tbody>
                </table>
            </section>
            <section class="modal-section">
                <h4>Thermistors</h4>
                <table class="detail-table" aria-label="Module thermistor readings">
                    <thead id="moduleThermTableHead"></thead>
                    <tbody id="moduleThermTableBody"></tbody>
                </table>
            </section>
            <p class="modal-meta"><strong>ID</strong><span id="moduleModalSiliconId" class="modal-meta-value">---</span></p>
            <p id="moduleModalEmpty" class="modal-empty" hidden>No module detail data available.</p>
        </div>
    </div>
</body>
</html>
